<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Pokémon Aleatório</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2&family=VT323&display=swap" rel="stylesheet">


  <style>
    body {
      font-family: 'Exo 2', serif;
      background-color: #1e2a38;
      color: #ecf0f1;
    }

    .fade-in {
      animation: fadeIn 0.6s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .search-bar {
      width: 250px;
      padding: 10px;
      background-color: #2c3e50;
      color: #ecf0f1;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      margin-top: 20px;
      transition: box-shadow 0.3s;
    }

    .search-bar:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(123, 97, 255, 0.3);
    }

    .search-bar::placeholder {
      color: #95a5a6;
    }

    input[type="checkbox"] {
      accent-color: #7f5af0;
    }

    input[type="range"] {
      accent-color: #a78bfa;
    }

    .pokemon-title {
      font-family: 'VT323', cursive;
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- Navbar -->
  <nav class="bg-gray-900/90 shadow-md sticky top-0 z-50 backdrop-blur">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-xl md:text-5xl text-purple-400 drop-shadow-sm pokemon-title">SquadMaker</h1>
    </div>
  </nav>

  <!-- Header -->
  <header class="text-center py-12 px-4">
    <h2 class="text-4xl md:text-5xl font-extrabold text-indigo-300 mb-4 drop-shadow-sm pokemon-title ">Monte seu Time de Pokémon</h2>
    <p class="text-lg text-gray-300 max-w-xl mx-auto ">Escolha as gerações, defina a quantidade de integrantes e visualize seus Pokémon com habilidades incríveis.</p>
  </header>

  <!-- Container com Filtros e Time Gerado -->
  <section class="flex flex-col lg:flex-row lg:items-start justify-between px-4 mb-16 gap-10">
    <!-- Filtros -->
    <div class="lg:sticky lg:top-20 max-w-md bg-white/10 rounded-2xl shadow-lg p-8 md:p-10 border border-indigo-100 fade-in w-full lg:ml-2 flex-shrink-0 h-fit">

      <h2 class="text-4xl font-extrabold text-indigo-300 mb-8 text-center pokemon-title">Filtros</h2>

      <!-- Gerações -->
      <div class="mb-8">
        <label class="block font-semibold mb-3 text-gray-300 text-lg">Gerações:</label>
        <div class="flex flex-wrap gap-3">
          <label><input type="checkbox" class="geracao" value="1" checked> Gen 1</label>
          <label><input type="checkbox" class="geracao" value="2" checked> Gen 2</label>
          <label><input type="checkbox" class="geracao" value="3" checked> Gen 3</label>
          <label><input type="checkbox" class="geracao" value="4" checked> Gen 4</label>
          <label><input type="checkbox" class="geracao" value="5" checked> Gen 5</label>
          <label><input type="checkbox" class="geracao" value="6" checked> Gen 6</label>
          <label><input type="checkbox" class="geracao" value="7" checked> Gen 7</label>
          <label><input type="checkbox" class="geracao" value="8" checked> Gen 8</label>
        </div>
      </div>

      <!-- Quantidade -->
      <div class="mb-6">
        <label class="block font-semibold mb-3 text-gray-300 text-lg">Quantidade:</label>
        <input type="range" id="quantidadeRange" min="1" max="6" value="3" class="w-full accent-indigo-600">
        <p class="text-center mt-2 text-indigo-300 font-semibold">Quantidade: <span id="qtdExibida">3</span></p>
      </div>

      <!-- Botão -->
      <div class="flex justify-center mt-6">
        <button onclick="gerarTime()" class="bg-purple-500 hover:bg-purple-600 text-white font-semibold py-3 px-8 rounded-full text-lg shadow-lg transition duration-300">
          🎲 Gerar Time Aleatório
        </button>
      </div>
    </div>

    <!-- Time Gerado -->
    <section id="time" class="text-center px-4 mb-10 w-full fade-in">
      <h2 class="text-4xl font-bold text-indigo-300 mb-8 pokemon-title">Seu Time</h2>
      <div id="timeContainer" class="flex flex-wrap justify-center gap-6"></div>
    </section>
  </section>

  <!-- Barra de Pesquisa -->
  <div class="flex justify-center px-4 mb-16">
    <input type="text" id="searchInput" class="search-bar" placeholder="Buscar Pokémon..." oninput="filtrarPokemon()">
  </div>

  <!-- Todos -->
  <section class="mb-12">
    <h2 class="text-5xl font-bold text-indigo-300 mb-4 text-center pokemon-title">Pokédex</h2>
    <div class="px-4 md:px-10">
      <div id="todosContainer" class="flex flex-wrap justify-center gap-6"></div>
    </div>
  </section>

<script>
  const pokemons = [];
  const todosContainer = document.getElementById('todosContainer');
  const timeContainer = document.getElementById('timeContainer');
  const qtdSpan = document.getElementById('qtdExibida');
  const rangeInput = document.getElementById('quantidadeRange');
  const searchInput = document.getElementById('searchInput');

  rangeInput.addEventListener('input', () => {
    qtdSpan.textContent = rangeInput.value;
  });

  const geracoes = {
    1: [1, 151], 2: [152, 251], 3: [252, 386], 4: [387, 493],
    5: [494, 649], 6: [650, 721], 7: [722, 809], 8: [810, 898],
  };

  function descobrirGeracao(id) {
    for (const gen in geracoes) {
      const [inicio, fim] = geracoes[gen];
      if (id >= inicio && id <= fim) return `Geração ${gen}`;
    }
    return 'Desconhecida';
  }

  async function carregarPokemons() {
    for (let gen = 1; gen <= 8; gen++) {
      const [inicio, fim] = geracoes[gen];
      for (let id = inicio; id <= fim; id++) {
        try {
          const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
          const data = await res.json();
          const pokemon = {
            id: data.id,
            name: data.name[0].toUpperCase() + data.name.slice(1),
            image: data.sprites.front_default,
            abilities: data.abilities.map(ab => ab.ability.name.replace('-', ' ')),
            generation: descobrirGeracao(data.id),
          };
          pokemons.push(pokemon);
          renderPokemon(pokemon);
        } catch {}
      }
    }
  }

  function renderPokemon(pokemon) {
    const card = document.createElement('div');
    card.className = "bg-gray-800/90 border border-indigo-300 rounded-xl shadow-md p-4 w-60 text-center";
    card.innerHTML = `
      <p class="text-sm text-indigo-400 font-medium mb-2">${pokemon.generation}</p>
      <img src="${pokemon.image}" alt="${pokemon.name}" class="mx-auto w-20 h-20 mb-2 drop-shadow">
      <h3 class="text-md font-semibold text-indigo-200">#${pokemon.id} - ${pokemon.name}</h3>
      <div class="mt-2">
        ${pokemon.abilities.map(hab => `
          <p class="text-sm text-gray-300 mb-1">${hab}</p>
          <div class="w-full bg-gray-600 rounded-full h-2 mb-2">
            <div class="bg-indigo-400 h-2 rounded-full" style="width:${Math.floor(Math.random() * 80) + 20}%"></div>
          </div>
        `).join('')}
      </div>
    `;
    todosContainer.appendChild(card);
  }

  function gerarTime() {
    const selecionadas = Array.from(document.querySelectorAll('.geracao:checked')).map(cb => parseInt(cb.value));
    const qtd = parseInt(rangeInput.value);

    const filtrados = pokemons.filter(p => {
      return selecionadas.some(gen => {
        const [inicio, fim] = geracoes[gen];
        return p.id >= inicio && p.id <= fim;
      });
    });

    const time = [...filtrados].sort(() => 0.5 - Math.random()).slice(0, qtd);

    timeContainer.innerHTML = '';
    time.forEach(pokemon => {
      const card = document.createElement('div');
      card.className = "bg-gray-800/90 border border-purple-500 rounded-xl shadow-md p-4 w-60 text-center";
      card.innerHTML = `
        <p class="text-sm text-purple-500 font-medium mb-2">${pokemon.generation}</p>
        <img src="${pokemon.image}" alt="${pokemon.name}" class="mx-auto w-20 h-20 mb-2">
        <h3 class="text-md font-bold text-purple-500">#${pokemon.id} - ${pokemon.name}</h3>
        <div class="mt-3 text-left">
          ${pokemon.abilities.map(h => `
            <p class="text-sm text-gray-300 mb-1">${h}</p>
            <div class="w-full bg-yellow-100 rounded-full h-2 mb-2">
              <div class="bg-purple-400 h-2 rounded-full" style="width:${Math.floor(Math.random() * 80) + 20}%"></div>
            </div>
          `).join('')}
        </div>
      `;
      timeContainer.appendChild(card);
    });
  }

  function filtrarPokemon() {
    const searchTerm = searchInput.value.toLowerCase();
    const filtrados = pokemons.filter(pokemon => pokemon.name.toLowerCase().includes(searchTerm));
    todosContainer.innerHTML = '';
    filtrados.forEach(renderPokemon);
  }

  carregarPokemons();
</script>

</body>
</html>
